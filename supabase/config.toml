# Cấu hình Supabase CLI cho NewsHub.
# project_id = project ref (lấy trong URL dashboard: /project/<ref>).
project_id = "mfwnayxisdsmlppywjir"

# ── Edge Functions ──────────────────────────────────────────────
# Cả hai đều tự kiểm tra quyền bên trong (send-newsletter dùng x-cron-secret;
# unsubscribe là endpoint công khai theo token) nên tắt verify_jwt để pg_cron
# và link trong email gọi được mà không cần JWT của Supabase.
[functions.send-newsletter]
verify_jwt = false

[functions.unsubscribe]
verify_jwt = false

# Quản trị tài khoản bắt buộc có JWT; Edge Function còn kiểm tra role admin
# trong profiles trước khi dùng service_role đổi mật khẩu hoặc xóa user.
[functions.manage-user]
verify_jwt = true
